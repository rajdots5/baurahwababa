<!DOCTYPE html>
<html>
<head>
  <title>Inspect Images</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #eee; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
    img { max-width: 100%; max-height: 400px; object-fit: contain; }
    h3 { margin: 10px 0 5px; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Inspect Temple Images</h1>
  <div class="grid">
    <div class="card">
      <img src="images/WhatsApp Image 2026-06-29 at 18.51.41.jpeg">
      <h3>WhatsApp Image 2026-06-29 at 18.51.41.jpeg</h3>
    </div>
    <div class="card">
      <img src="images/WhatsApp Image 2026-06-29 at 18.51.42 (1).jpeg">
      <h3>WhatsApp Image 2026-06-29 at 18.51.42 (1).jpeg</h3>
    </div>
    <div class="card">
      <img src="images/WhatsApp Image 2026-06-29 at 18.51.42.jpeg">
      <h3>WhatsApp Image 2026-06-29 at 18.51.42.jpeg</h3>
    </div>
    <div class="card">
      <img src="images/temple4.jpeg">
      <h3>temple4.jpeg</h3>
    </div>
  </div>
</body>
</html>
